<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>সায়ের — বাংলার কবি</title>
<script src="https://js.puter.com/v2/"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+Bengali:wght@300;400;500;600;700&family=Lora:ital,wght@0,400;0,600;1,400;1,600&family=Cinzel:wght@400;600;700&family=Amiri:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">

<style>
:root {
  --bg-deep:     #080c10;
  --bg-input:    #0a0f15;
  --border:      rgba(180,145,70,0.18);
  --border-glow: rgba(180,145,70,0.40);
  --gold:        #c9a84c;
  --gold-dim:    #8a6a28;
  --text-main:   #e8dcc8;
  --text-muted:  #7a6e5e;
  --text-poem:   #d4c4a0;
  --green-mid:   #122b1a;
  --green-acc:   #1e4a2a;
  --radius:      14px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;background:var(--bg-deep);color:var(--text-main);font-family:'Noto Serif Bengali',serif;overflow:hidden;}

body::before{
  content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background:
    radial-gradient(ellipse 60% 40% at 50% 0%,rgba(180,145,70,0.07) 0%,transparent 70%),
    radial-gradient(ellipse 40% 50% at 0% 100%,rgba(18,80,40,0.12) 0%,transparent 60%);
}

.app{
  position:relative;z-index:1;
  display:grid;grid-template-rows:auto 1fr auto;
  height:100vh;max-width:780px;margin:0 auto;padding:0 20px;
}

/* HEADER */
header{padding:26px 0 18px;text-align:center;}
.arabic-top{font-family:'Amiri',serif;font-size:1rem;color:var(--gold);opacity:.65;letter-spacing:3px;margin-bottom:14px;animation:up 1s ease both;}
.logo-line{display:flex;align-items:center;justify-content:center;gap:16px;margin-bottom:5px;animation:up 1s .15s ease both;opacity:0;}
.ornament{color:var(--gold-dim);font-size:1rem;opacity:.7;}
.logo-name{font-family:'Cinzel',serif;font-size:clamp(1.9rem,5vw,2.9rem);font-weight:700;letter-spacing:10px;color:var(--gold);text-shadow:0 0 60px rgba(201,168,76,.35),0 2px 0 rgba(0,0,0,.6);line-height:1;}
.logo-bn{font-family:'Noto Serif Bengali',serif;font-size:.85rem;font-weight:300;color:var(--text-muted);letter-spacing:2px;animation:up 1s .3s ease both;opacity:0;}
.header-rule{width:100%;height:1px;background:linear-gradient(90deg,transparent 0%,var(--border-glow) 30%,var(--gold-dim) 50%,var(--border-glow) 70%,transparent 100%);margin-top:16px;animation:up 1s .4s ease both;opacity:0;}

/* CHAT */
.messages{overflow-y:auto;display:flex;flex-direction:column;gap:0;padding:8px 0 12px;scroll-behavior:smooth;}
.messages::-webkit-scrollbar{width:3px;}
.messages::-webkit-scrollbar-thumb{background:var(--gold-dim);border-radius:2px;}

.greeting{padding:28px 0 14px;text-align:center;animation:up 1s .6s ease both;opacity:0;}
.greeting-poem{font-family:'Noto Serif Bengali',serif;font-size:1.02rem;font-style:italic;color:var(--text-poem);line-height:2.1;white-space:pre-line;}
.greeting-seal{display:inline-block;margin-top:12px;font-family:'Lora',serif;font-size:.7rem;font-style:italic;color:var(--gold-dim);letter-spacing:1px;border-top:1px solid var(--border);padding-top:7px;}

.row{display:flex;padding:8px 0;animation:up .35s ease both;opacity:0;}
.row.user{justify-content:flex-end;}
.row.bot{justify-content:flex-start;}

.bubble{max-width:76%;padding:13px 18px;font-size:.96rem;line-height:1.95;position:relative;}
.row.user .bubble{
  background:linear-gradient(135deg,rgba(201,168,76,.13),rgba(201,168,76,.07));
  border:1px solid rgba(201,168,76,.22);
  border-radius:var(--radius) 4px var(--radius) var(--radius);
  color:var(--text-main);font-family:'Noto Serif Bengali',serif;font-size:.92rem;
}
.row.bot .bubble{
  background:linear-gradient(135deg,rgba(18,43,26,.7),rgba(13,33,20,.85));
  border:1px solid rgba(180,145,70,.15);
  border-radius:4px var(--radius) var(--radius) var(--radius);
  color:var(--text-poem);font-family:'Noto Serif Bengali',serif;
  white-space:pre-wrap;font-size:.99rem;line-height:2.05;
}
.row.bot .bubble::before{
  content:'';position:absolute;top:0;left:0;
  width:2px;height:100%;border-radius:2px;
  background:linear-gradient(180deg,var(--gold-dim),transparent);
}

/* streaming cursor */
.cursor{
  display:inline-block;width:2px;height:1em;
  background:var(--gold-dim);margin-left:2px;
  vertical-align:text-bottom;
  animation:blink .7s infinite;
}

/* typing dots (before stream starts) */
.typing-row{display:flex;padding:8px 0;animation:up .35s ease both;opacity:0;}
.typing{display:flex;align-items:center;gap:6px;padding:15px 18px;
  background:linear-gradient(135deg,rgba(18,43,26,.7),rgba(13,33,20,.85));
  border:1px solid rgba(180,145,70,.15);
  border-radius:4px var(--radius) var(--radius) var(--radius);}
.typing span{width:6px;height:6px;border-radius:50%;background:var(--gold-dim);animation:pulse 1.3s infinite;}
.typing span:nth-child(2){animation-delay:.2s;}
.typing span:nth-child(3){animation-delay:.4s;}

/* INPUT */
.input-zone{padding:14px 0 22px;}
.input-rule{width:100%;height:1px;background:linear-gradient(90deg,transparent,var(--border) 40%,var(--border) 60%,transparent);margin-bottom:14px;}
.input-row{display:flex;gap:10px;align-items:flex-end;}

textarea{
  flex:1;background:var(--bg-input);border:1px solid var(--border);border-radius:var(--radius);
  color:var(--text-main);font-family:'Noto Serif Bengali',serif;font-size:.94rem;line-height:1.7;
  padding:13px 17px;resize:none;outline:none;min-height:50px;max-height:130px;overflow-y:auto;
  transition:border-color .25s;
}
textarea::placeholder{color:var(--text-muted);font-style:italic;font-size:.86rem;}
textarea:focus{border-color:var(--border-glow);}
textarea::-webkit-scrollbar{width:3px;}
textarea::-webkit-scrollbar-thumb{background:var(--gold-dim);border-radius:2px;}

.send{
  width:50px;height:50px;
  background:linear-gradient(145deg,var(--green-acc),var(--green-mid));
  border:1px solid rgba(180,145,70,.3);border-radius:var(--radius);
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  flex-shrink:0;transition:all .2s;color:var(--gold);
}
.send:hover:not(:disabled){background:linear-gradient(145deg,#2a6038,#1a3c24);border-color:var(--gold-dim);box-shadow:0 4px 20px rgba(26,74,42,.5);}
.send:disabled{opacity:.35;cursor:default;}
.send svg{width:20px;height:20px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}

.footer-note{text-align:center;margin-top:9px;font-size:.66rem;color:var(--text-muted);font-family:'Lora',serif;font-style:italic;opacity:.55;}

@keyframes up{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}
@keyframes pulse{0%,80%,100%{transform:scale(1);opacity:.5;}40%{transform:scale(1.4);opacity:1;}}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:0;}}

@media(max-width:520px){
  .app{padding:0 13px;}
  .logo-name{letter-spacing:6px;}
  .bubble{max-width:88%;padding:11px 14px;}
}
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="arabic-top">بِسْمِ اللهِ الرَّحْمٰنِ الرَّحِيْمِ</div>
    <div class="logo-line">
      <span class="ornament">✦ ✦</span>
      <span class="logo-name">SAYER</span>
      <span class="ornament">✦ ✦</span>
    </div>
    <div class="logo-bn">সায়ের — বাংলার মুসলিম কবি</div>
    <div class="header-rule"></div>
  </header>

  <div class="messages" id="chat">
    <div class="greeting">
      <div class="greeting-poem">আস-সালামু আলাইকুম, বন্ধু আমার,
কবিতার ভাষায় করি নমস্কার।
নজরুলের সুর, ওসমানের রস —
সায়েরের কাছে তোমার কী দরকার?</div>
      <div class="greeting-seal">— সায়ের, কবি ও রসিক</div>
    </div>
  </div>

  <div class="input-zone">
    <div class="input-rule"></div>
    <div class="input-row">
      <textarea id="inp" placeholder="সায়েরকে যা খুশি জিজ্ঞেস করো..." rows="1"
        onkeydown="onKey(event)" oninput="resize(this)"></textarea>
      <button class="send" id="btn" onclick="send()">
        <svg viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
      </button>
    </div>
    <div class="footer-note">সায়ের · Powered by Claude Sonnet 4.6 · নজরুল ও ওসমান হাদীর অনুপ্রেরণায়</div>
  </div>
</div>

<script>
const SYSTEM = `তুমি "সায়ের" — একজন জীবন্ত, প্রাণবন্ত, রসিক বাংলাদেশী মুসলিম কবি চ্যাটবট।

তোমার পরিচয়:
- কাজী নজরুল ইসলামের মতো আবেগী, বিদ্রোহী, ইসলামিক চেতনায় পূর্ণ কবি
- ওসমান হাদীর মতো রসিক, হাস্যরসপূর্ণ, সহজ-সরল ভাষার কবি
- মুসলমান — আল্লাহ, রাসূল (সা.), ইসলামের প্রতি গভীর শ্রদ্ধা ও ভালোবাসা
- বাংলাদেশের সন্তান, বাংলার প্রকৃতি ও মানুষ হৃদয়ে ধারণ করো

উত্তর দেওয়ার কঠোর নিয়ম:
১. প্রতিটি উত্তর অবশ্যই বাংলা কবিতায় — ছন্দ ও মিল রেখে, ৪ থেকে ১৬ লাইন
২. বিষয় অনুযায়ী হাস্যরস বা গাম্ভীর্য রক্ষা করো
৩. ইসলামিক বিষয়ে সর্বদা শ্রদ্ধাশীল ও গুরুগম্ভীর থাকো
৪. প্রতিটি কবিতার শেষে একটি নতুন লাইনে "— সায়ের" স্বাক্ষর দাও
৫. শুধু কবিতায় কথা বলো — গদ্যে নয়, ব্যাখ্যায় নয়, শুধু কবিতা

বিষয় অনুযায়ী শৈলী:
- মজার প্রশ্ন → ওসমান হাদী ঢঙে হালকা রসিক কবিতা
- আবেগের প্রশ্ন → নজরুল ঢঙে গভীর অনুভূতির কবিতা
- ইসলামিক প্রশ্ন → হামদ-নাতের ঢঙে শ্রদ্ধামাখা কবিতা
- সাধারণ প্রশ্ন → সহজ সুন্দর ছন্দময় কবিতা`;

let history = [];
let isStreaming = false;

function resize(el){
  el.style.height='auto';
  el.style.height=Math.min(el.scrollHeight,130)+'px';
}

function onKey(e){
  if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();}
}

function scrollDown(){
  const c=document.getElementById('chat');
  c.scrollTop=c.scrollHeight;
}

function addUserRow(text){
  const chat=document.getElementById('chat');
  const row=document.createElement('div');
  row.className='row user';
  const b=document.createElement('div');
  b.className='bubble';
  b.textContent=text;
  row.appendChild(b);
  chat.appendChild(row);
  requestAnimationFrame(()=>{row.style.opacity='1';});
  scrollDown();
}

function showTyping(){
  const chat=document.getElementById('chat');
  const row=document.createElement('div');
  row.className='typing-row';
  row.id='typing';
  row.innerHTML=`<div class="typing"><span></span><span></span><span></span></div>`;
  chat.appendChild(row);
  requestAnimationFrame(()=>{row.style.opacity='1';});
  scrollDown();
}

function hideTyping(){
  const el=document.getElementById('typing');
  if(el) el.remove();
}

function createBotRow(){
  const chat=document.getElementById('chat');
  const row=document.createElement('div');
  row.className='row bot';
  const b=document.createElement('div');
  b.className='bubble';
  // cursor blinking while streaming
  const cur=document.createElement('span');
  cur.className='cursor';
  cur.id='stream-cursor';
  b.appendChild(cur);
  row.appendChild(b);
  chat.appendChild(row);
  requestAnimationFrame(()=>{row.style.opacity='1';});
  scrollDown();
  return b;
}

async function send(){
  if(isStreaming) return;
  const inp=document.getElementById('inp');
  const btn=document.getElementById('btn');
  const text=inp.value.trim();
  if(!text) return;

  isStreaming=true;
  addUserRow(text);

  // build messages with system context prepended to first user message
  const messages = [
    { role: 'system', content: SYSTEM },
    ...history,
    { role: 'user', content: text }
  ];

  inp.value=''; inp.style.height='auto';
  btn.disabled=true;
  showTyping();

  try{
    const response = await puter.ai.chat(messages, {
      model: 'claude-sonnet-4-6',
      stream: true
    });

    hideTyping();
    const bubble = createBotRow();
    const cursor = document.getElementById('stream-cursor');

    let fullText = '';

    for await (const part of response){
      const chunk = part?.text || '';
      fullText += chunk;
      // update bubble text (before cursor)
      bubble.childNodes[0]
        ? bubble.insertBefore(document.createTextNode(''), cursor)
        : null;
      // clear text nodes, keep cursor
      while(bubble.firstChild !== cursor){
        bubble.removeChild(bubble.firstChild);
      }
      const tn = document.createTextNode(fullText);
      bubble.insertBefore(tn, cursor);
      scrollDown();
    }

    // remove cursor when done
    if(cursor) cursor.remove();

    history.push({role:'user', content: text});
    history.push({role:'assistant', content: fullText});

  } catch(err){
    hideTyping();
    console.error(err);
    const chat=document.getElementById('chat');
    const row=document.createElement('div');
    row.className='row bot';
    const b=document.createElement('div');
    b.className='bubble';
    b.textContent='ভাই, কিছু একটা গণ্ডগোল হলো!\nএকটু পরে আবার চেষ্টা করো।';
    row.appendChild(b);
    chat.appendChild(row);
    requestAnimationFrame(()=>{row.style.opacity='1';});
    scrollDown();
  }

  isStreaming=false;
  btn.disabled=false;
  inp.focus();
}

window.addEventListener('load',()=>{
  setTimeout(()=>document.getElementById('inp').focus(), 700);
});
</script>
</body>
</html>
